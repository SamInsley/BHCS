<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enter the Show | Broadway Horticultural & Craft Show</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      background: #f4faf3;
    }

    .entry-page {
      margin-top: 2rem;
      margin-bottom: 3rem;
      background: white;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    }

    .entry-hero h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #102015;
    }

    .entry-hero p {
      font-size: 1.1rem;
      color: #333;
    }

    .class-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .class-btn {
      border: 2px solid;
      border-radius: 999px;
      padding: 0.85rem 1.3rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: white;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .class-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .entry-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .entry-card {
      background: #fbfdf9;
      border: 1px solid #e2eadf;
      border-radius: 18px;
      padding: 1.5rem;
    }

    .entry-card h2 {
      margin-top: 0;
      color: #102015;
    }

    #entryList {
      padding-left: 1.2rem;
      line-height: 1.8;
      font-weight: 600;
    }

    form label {
      display: block;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    form input {
      display: block;
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.8rem;
      border-radius: 12px;
      border: 1px solid #ccd8c8;
      font-size: 1rem;
    }

    .submit-btn {
      background: #2f5d34;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #244828;
    }

    #confirmation {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 12px;
      background: #edf8e8;
      color: #2f5d34;
      font-weight: 700;
    }

    @media (max-width: 800px) {
      .entry-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <div class="container">
    <nav class="nav">
      <a class="navlink" href="index.html">Home</a>
      <a class="navlink" href="about.html">About</a>
      <a class="navlink" href="gallery.html">Gallery & Stalls</a>
      <a class="navlink" href="stall.html">Stall Application</a>
      <a class="navlink" href="contact.html">Contact</a>
      <a class="navlink" href="schedule.html">Show Schedule</a>
    </nav>
  </div>
</header>

<main class="container entry-page">

  <section class="entry-hero">
    <h1>Enter the 2026 Show</h1>
    <p>This is currently not live but will be shortly. Keep tuned!</p>
  </section>

  <section class="entry-card">
    <h2>Choose Your Classes</h2>
    <div class="class-buttons" id="classButtons"></div>
  </section>

  <div class="entry-grid">

    <section class="entry-card">
      <h2>Your Selected Entries</h2>
      <ul id="entryList"></ul>
    </section>

    <section class="entry-card">
      <h2>Your Details</h2>

      <form id="entryForm">
        <label>
          Name
          <input type="text" id="name" required>
        </label>

        <label>
          Address
          <input type="text" id="address" required>
        </label>

        <label>
          Email
          <input type="email" id="email" required>
        </label>

        <label>
          Phone Number
          <input type="tel" id="phone">
        </label>

        <button class="submit-btn" type="submit">Submit Entry</button>
      </form>

      <p id="confirmation" style="display:none;">
        Thank you. Your entry has been submitted.
      </p>
    </section>

  </div>

</main>

<script>
let selectedEntries = [];

const sectionStyles = {
  A: { name: "Vegetables", emoji: "🥕", colour: "#d60000" },
  B: { name: "Fruit", emoji: "🍎", colour: "#009b22" },
  C: { name: "Flowers", emoji: "🌸", colour: "#d4147a" },
  D: { name: "Pot Plants", emoji: "🪴", colour: "#7b352a" },
  E: { name: "Floral Art", emoji: "💐", colour: "#3f8f3f" },
  F: { name: "Preserves / Non-Preserves", emoji: "🍯", colour: "#8b4a8b" },
  G: { name: "Cookery", emoji: "🍰", colour: "#c46a2b" },
  H: { name: "Homemade Beverages", emoji: "🍾", colour: "#b0005a" },
  J: { name: "Handicrafts", emoji: "🧵", colour: "#555555" },
  K: { name: "Photography", emoji: "📷", colour: "#6b8e23" },
  L: { name: "Children", emoji: "🎨", colour: "#e2a23a" },
  M: { name: "Family Fun", emoji: "👨‍👩‍👧‍👦", colour: "#c58ac9" }
};

const classes = [
  ...Array.from({length:39}, (_,i)=>`A${i+1}`),
  ...Array.from({length:10}, (_,i)=>`B${i+1}`),
  ...Array.from({length:35}, (_,i)=>`C${i+1}`),
  ...Array.from({length:13}, (_,i)=>`D${i+1}`),
  ...Array.from({length:5}, (_,i)=>`E${i+1}`),
  ...Array.from({length:16}, (_,i)=>`F${i+1}`),
  ...Array.from({length:13}, (_,i)=>`G${i+1}`),
  ...Array.from({length:5}, (_,i)=>`H${i+1}`),
  ...Array.from({length:17}, (_,i)=>`J${i+1}`),
  ...Array.from({length:7}, (_,i)=>`K${i+1}`),
  ...Array.from({length:10}, (_,i)=>`L${i+1}`),
  ...Array.from({length:3}, (_,i)=>`M${i+1}`)
];

function buildButtons() {
  const holder = document.getElementById("classButtons");
  holder.innerHTML = "";

  classes.forEach(classCode => {
    const section = classCode.charAt(0);
    const style = sectionStyles[section];

    const button = document.createElement("button");
    button.type = "button";
    button.className = "class-btn";
    button.textContent = `${style.emoji} ${classCode}`;
    button.style.color = style.colour;
    button.style.borderColor = style.colour;
    button.style.background = `${style.colour}18`;
    button.title = style.name;

    button.onclick = () => addEntry(classCode);

    holder.appendChild(button);
  });
}

function addEntry(entry) {
  if (!selectedEntries.includes(entry)) {
    selectedEntries.push(entry);
    selectedEntries.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
    updateEntryList();
  }
}

function updateEntryList() {
  const list = document.getElementById("entryList");
  list.innerHTML = "";

  if (selectedEntries.length === 0) {
    const li = document.createElement("li");
    li.textContent = "No classes selected yet.";
    list.appendChild(li);
    return;
  }

  selectedEntries.forEach(entry => {
    const li = document.createElement("li");
    li.textContent = entry;
    list.appendChild(li);
  });
}

buildButtons();
updateEntryList();

document.getElementById("entryForm").addEventListener("submit", function(event) {
  event.preventDefault();

  if (selectedEntries.length === 0) {
    alert("Please select at least one class.");
    return;
  }

  const formData = new FormData();

  formData.append("entry.433563710", document.getElementById("name").value);
  formData.append("entry.1007946641", document.getElementById("address").value);
  formData.append("entry.1062495897", document.getElementById("email").value);
  formData.append("entry.1685688433", document.getElementById("phone").value);
  formData.append("entry.1761290965", selectedEntries.join(", "));

  fetch("https://docs.google.com/forms/d/e/1FAIpQLScE8nN6XIkJ1EsWLpoqebWYdElo78qIgnvSzpY7AGevQugU1w/formResponse", {
    method: "POST",
    mode: "no-cors",
    body: formData
  });

  document.getElementById("confirmation").style.display = "block";

  document.getElementById("entryForm").reset();
  selectedEntries = [];
  updateEntryList();
});
</script>

</body>
</html>
