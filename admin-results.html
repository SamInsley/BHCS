<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BHCS Results Tool</title>

<style>
body{font-family:sans-serif;background:#f4faf3;padding:20px;}
h1{text-align:center;}
.card{background:white;padding:20px;border-radius:20px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
input{padding:12px;margin:6px;font-size:18px;border-radius:10px;border:1px solid #ccc;}
button{padding:14px 20px;font-size:18px;background:#2e7d32;color:white;border:none;border-radius:14px;cursor:pointer;margin:5px;}
button:hover{background:#1b5e20;}
.big{font-size:20px;margin:10px 0;}
.reset{background:#c62828;}
.reset:hover{background:#8e0000;}
.backup{background:#1565c0;}
.backup:hover{background:#0d47a1;}
.result-row{padding:14px;border-bottom:1px solid #ddd;font-size:18px;}
.small-note{color:#555;}
.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.55);}
.modal-content{background:white;margin:5% auto;padding:25px;border-radius:20px;width:90%;max-width:750px;max-height:80vh;overflow:auto;}
.close{float:right;font-size:34px;font-weight:bold;cursor:pointer;}
.entrant-row{font-size:19px;padding:8px;border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<h1>🏆 BHCS Results Tool</h1>

<div class="card">
<h2>Upload Entrants CSV</h2>
<p class="small-note">Expected format: NAME, NO, ENTRIES</p>
<input type="file" id="csvFile" accept=".csv">
<br>
<button onclick="openEntrantsPopup()">Show Current Entrants</button>
</div>

<div class="card">
<h2>Add Late Entrant Manually</h2>
<p id="nextIdText" class="small-note"></p>
<input id="id" placeholder="ID">
<input id="name" placeholder="Name">
<button onclick="addEntrant()">Add Entrant</button>
</div>

<div class="card">
<h2>Enter Class Result</h2>

<input id="classCode" placeholder="Class e.g. A1">
<br>
<input id="first" placeholder="1st ID">
<input id="second" placeholder="2nd ID">
<input id="third" placeholder="3rd ID">
<br>
<input id="hc" placeholder="HC IDs e.g. 12,18,24">

<br><br>
<button onclick="addResult()">Save Class Result</button>

<p class="small-note">
Highly Commended can contain multiple IDs separated by commas. Each HC gets 1 point.
</p>
</div>

<div class="card">
<h2>Class Results Record</h2>
<div id="classResults"></div>
</div>

<div class="card">
<h2>Leaderboard</h2>
<div id="leaderboard"></div>
</div>

<div class="card">
<h2>Backup / Sharing</h2>
<button class="backup" onclick="exportBackup()">Export Backup</button>
<button class="backup" onclick="document.getElementById('backupFile').click()">Import Backup</button>
<button class="backup" onclick="exportResultsCSV()">Export Results CSV</button>
<input type="file" id="backupFile" accept=".json" style="display:none">
</div>

<div class="card">
<button class="reset" onclick="clearEverything()">Reset All Data</button>
</div>

<div id="entrantsModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeEntrantsPopup()">&times;</span>
    <h2>Current Entrants</h2>
    <p id="popupNextId"></p>
    <div id="entrantDirectory"></div>
  </div>
</div>

<script>
let entrants = JSON.parse(localStorage.getItem("bhcsEntrants")) || {};
let scores = JSON.parse(localStorage.getItem("bhcsScores")) || {};
let classResults = JSON.parse(localStorage.getItem("bhcsClassResults")) || {};

function saveData(){
  localStorage.setItem("bhcsEntrants", JSON.stringify(entrants));
  localStorage.setItem("bhcsScores", JSON.stringify(scores));
  localStorage.setItem("bhcsClassResults", JSON.stringify(classResults));
}

function getNextAvailableId(){
  const ids = Object.keys(entrants)
    .map(id => parseInt(id))
    .filter(id => !isNaN(id));

  if(ids.length === 0) return 2;
  return Math.max(...ids) + 1;
}

function updateNextId(){
  const nextId = getNextAvailableId();
  document.getElementById("nextIdText").innerHTML =
    `<strong>Next available ID:</strong> ${nextId}`;

  if(!document.getElementById("id").value){
    document.getElementById("id").value = nextId;
  }
}

function addEntrant(){
  const id = document.getElementById("id").value.trim();
  const name = document.getElementById("name").value.trim();

  if(!id || !name){
    alert("Please enter both ID and name.");
    return;
  }

  if(entrants[id]){
    if(!confirm("ID " + id + " already exists for " + entrants[id] + ". Replace it?")){
      return;
    }
  }

  entrants[id] = name;

  if(!(id in scores)){
    scores[id] = 0;
  }

  saveData();
  updateAll();

  document.getElementById("id").value = getNextAvailableId();
  document.getElementById("name").value = "";
}

function parseHC(value){
  return value.split(",").map(x => x.trim()).filter(x => x !== "");
}

function addPoints(id, points){
  if(!id) return;
  scores[id] = (scores[id] || 0) + points;
}

function removePoints(id, points){
  if(!id) return;
  scores[id] = (scores[id] || 0) - points;
  if(scores[id] < 0) scores[id] = 0;
}

function addResult(){
  const classCode = document.getElementById("classCode").value.trim().toUpperCase();
  const first = document.getElementById("first").value.trim();
  const second = document.getElementById("second").value.trim();
  const third = document.getElementById("third").value.trim();
  const hc = parseHC(document.getElementById("hc").value);

  if(!classCode){
    alert("Please enter a class code, e.g. A1.");
    return;
  }

  if(classResults[classCode]){
    if(!confirm(classCode + " already has a result. Replace it?")){
      return;
    }
    removeOldResultPoints(classResults[classCode]);
  }

  classResults[classCode] = { first, second, third, hc };

  addPoints(first, 5);
  addPoints(second, 3);
  addPoints(third, 2);
  hc.forEach(id => addPoints(id, 1));

  saveData();
  updateAll();

  document.getElementById("classCode").value = "";
  document.getElementById("first").value = "";
  document.getElementById("second").value = "";
  document.getElementById("third").value = "";
  document.getElementById("hc").value = "";
}

function removeOldResultPoints(result){
  removePoints(result.first, 5);
  removePoints(result.second, 3);
  removePoints(result.third, 2);

  if(Array.isArray(result.hc)){
    result.hc.forEach(id => removePoints(id, 1));
  } else if(result.hc){
    removePoints(result.hc, 1);
  }
}

function entrantLabel(id){
  if(!id) return "—";
  return `${entrants[id] || "Unknown"} (${id})`;
}

function hcLabel(hcList){
  if(!hcList || hcList.length === 0) return "—";
  if(!Array.isArray(hcList)) hcList = [hcList];
  return hcList.map(id => entrantLabel(id)).join(", ");
}

function updateLeaderboard(){
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  let html = "";

  sorted.forEach(([id,score]) => {
    if(score > 0){
      html += `<div class="big">${entrantLabel(id)} — ${score} pts</div>`;
    }
  });

  document.getElementById("leaderboard").innerHTML = html || "No scores yet.";
}

function sortClassCodes(a,b){
  const secA = a.match(/[A-Z]+/)?.[0] || "";
  const secB = b.match(/[A-Z]+/)?.[0] || "";
  const numA = parseInt(a.match(/\d+/)?.[0] || 0);
  const numB = parseInt(b.match(/\d+/)?.[0] || 0);

  if(secA === secB) return numA - numB;
  return secA.localeCompare(secB);
}

function updateClassResults(){
  let html = "";

  Object.keys(classResults).sort(sortClassCodes).forEach(classCode => {
    const r = classResults[classCode];

    html += `
      <div class="result-row">
        <strong>${classCode}</strong><br>
        1st: ${entrantLabel(r.first)}<br>
        2nd: ${entrantLabel(r.second)}<br>
        3rd: ${entrantLabel(r.third)}<br>
        HC: ${hcLabel(r.hc)}
      </div>
    `;
  });

  document.getElementById("classResults").innerHTML = html || "No class results yet.";
}

function updateEntrantDirectory(){
  const nextId = getNextAvailableId();

  document.getElementById("popupNextId").innerHTML =
    `<strong>Next available ID:</strong> ${nextId}`;

  let html = "";

  Object.keys(entrants)
    .map(id => parseInt(id))
    .filter(id => !isNaN(id))
    .sort((a,b) => a - b)
    .forEach(id => {
      html += `<div class="entrant-row"><strong>${id}</strong> — ${entrants[id]}</div>`;
    });

  document.getElementById("entrantDirectory").innerHTML =
    html || "No entrants loaded yet.";
}

function openEntrantsPopup(){
  updateEntrantDirectory();
  document.getElementById("entrantsModal").style.display = "block";
}

function closeEntrantsPopup(){
  document.getElementById("entrantsModal").style.display = "none";
}

window.onclick = function(event){
  const modal = document.getElementById("entrantsModal");
  if(event.target === modal){
    closeEntrantsPopup();
  }
};

function updateAll(){
  updateNextId();
  updateLeaderboard();
  updateClassResults();
  updateEntrantDirectory();
}

document.getElementById("csvFile").addEventListener("change", function(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const text = e.target.result;
    const lines = text.split(/\r?\n/);

    for(let i = 1; i < lines.length; i++){
      const row = lines[i].split(",");
      if(row.length < 2) continue;

      const name = row[0].trim();
      const id = row[1].trim();

      if(!name || !id) continue;

      entrants[id] = name;

      if(!(id in scores)){
        scores[id] = 0;
      }
    }

    saveData();
    updateAll();
    alert("Entrants loaded!");
  };

  reader.readAsText(file);
});

function exportBackup(){
  const backup = {
    entrants,
    scores,
    classResults,
    exportedAt: new Date().toISOString()
  };

  downloadFile("bhcs-results-backup.json", JSON.stringify(backup, null, 2), "application/json");
}

document.getElementById("backupFile").addEventListener("change", function(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const backup = JSON.parse(e.target.result);

    entrants = backup.entrants || {};
    scores = backup.scores || {};
    classResults = backup.classResults || {};

    saveData();
    updateAll();

    alert("Backup imported!");
  };

  reader.readAsText(file);
});

function exportResultsCSV(){
  let rows = [];

  rows.push([
    "Class",
    "1st ID",
    "1st Name",
    "2nd ID",
    "2nd Name",
    "3rd ID",
    "3rd Name",
    "HC IDs",
    "HC Names"
  ]);

  Object.keys(classResults).sort(sortClassCodes).forEach(classCode => {
    const r = classResults[classCode];
    const hcList = Array.isArray(r.hc) ? r.hc : (r.hc ? [r.hc] : []);

    rows.push([
      classCode,
      r.first || "",
      entrants[r.first] || "",
      r.second || "",
      entrants[r.second] || "",
      r.third || "",
      entrants[r.third] || "",
      hcList.join("; "),
      hcList.map(id => entrants[id] || "Unknown").join("; ")
    ]);
  });

  const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
  downloadFile("bhcs-class-results.csv", csv, "text/csv");
}

function csvEscape(value){
  value = String(value ?? "");
  if(value.includes(",") || value.includes("\"") || value.includes("\n")){
    return `"${value.replace(/"/g, '""')}"`;
  }
  return value;
}

function downloadFile(filename, content, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

function clearEverything(){
  if(confirm("Delete ALL saved entrants, scores and class results?")){
    localStorage.clear();
    entrants = {};
    scores = {};
    classResults = {};
    updateAll();
  }
}

updateAll();
</script>

</body>
</html>
